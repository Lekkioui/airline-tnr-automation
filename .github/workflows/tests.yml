name: Robot Framework Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout automation code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Install Chrome & Driver
      uses: browser-actions/setup-chrome@v1

    - name: Install ChromeDriver
      uses: nanasess/setup-chromedriver@v2

    - name: Clone Django project
      run: git clone https://github.com/Lekkioui/airline-django.git ../airline-django

    - name: Setup Django virtualenv & dependencies
      run: |
        cd ../airline-django
        python -m venv venv
        source venv/bin/activate
        pip install django
        python manage.py migrate
        python manage.py setup_test_data

    - name: Run Django server
      run: |
        cd ../airline-django
        source venv/bin/activate
        python manage.py runserver &
        sleep 5

    - name: Run Robot Framework Tests
      run: robot --variable BROWSER:headlesschrome tests/

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: robot-results
        path: |
          report.html
          log.html
          output.xml