name: Robot Framework Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout automation code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run Robocop Lint
      run: robocop --reports all tests/ pages/ resources/

  test:
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: airline_db
          # On aligne sur ton settings.py
          POSTGRES_USER: airline_user
          POSTGRES_PASSWORD: airline_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout automation code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Install Chrome & Driver
      uses: browser-actions/setup-chrome@v1

    - name: Install ChromeDriver
      uses: nanasess/setup-chromedriver@v2

    - name: Clone Django project
      run: git clone https://github.com/Lekkioui/airline-django.git ../airline-django

    - name: Fix Directory Path for Django Script
      # Cette commande crée un lien pour que ../airline-automation pointe vers le dossier actuel
      run: ln -s $(pwd) ../airline-automation

    - name: Setup Django & dependencies
      run: |
        cd ../airline-django
        pip install django psycopg2-binary
        python manage.py migrate
        python manage.py setup_test_data

    - name: Run Django server
      run: |
        cd ../airline-django
        nohup python manage.py runserver 0.0.0.0:8000 > django.log 2>&1 &
        sleep 10

    - name: Create Results Directory
      run: mkdir -p results

    - name: Run Robot Framework Tests
      run: |
        robot \
          --outputdir results \
          --variable BROWSER:headlesschrome \
          --variable CHROME_OPTIONS:"--headless --no-sandbox --disable-dev-shm-usage --remote-debugging-port=9222 --window-size=1920,1080" \
          tests/

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: robot-results
        path: results/